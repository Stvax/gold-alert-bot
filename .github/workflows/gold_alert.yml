name: Gold Breakout Alert

on:
  workflow_dispatch:
    inputs:
      test:
        description: "Send a test Telegram message instead of checking for a real signal"
        required: false
        default: false
        type: boolean

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python gold_alert_bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MODE: ${{ github.event.inputs.test }}
